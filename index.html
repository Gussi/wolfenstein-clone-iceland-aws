<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pots &amp; Parliament</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #0a0a0c;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #d8d2c4;
    }

    #game-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Main display canvas — scaled up from the offscreen 640x400 buffer */
    #screen {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #000;
      max-width: 100vw;
      max-height: 100vh;
      display: block;
    }

    /* Click-to-play overlay (pointer lock + audio gesture) */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(8, 8, 12, 0.88);
      text-align: center;
      cursor: pointer;
      z-index: 10;
    }

    #overlay h1 {
      font-size: 2.4rem;
      letter-spacing: 0.1em;
      margin: 0 0 0.4em;
      color: #e8e2d4;
      text-shadow: 2px 2px 0 #3a2f1f;
    }

    #overlay p {
      font-size: 1rem;
      opacity: 0.8;
      margin: 0.3em 0;
      max-width: 32em;
      line-height: 1.5;
    }

    #overlay .controls {
      margin-top: 1.6em;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    /* Loading progress bar */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0c;
      z-index: 20;
    }

    #loading-bar-track {
      width: 280px;
      height: 14px;
      border: 2px solid #58503f;
      background: #1a1712;
      margin-top: 1em;
    }

    #loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #b8a878;
      transition: width 0.1s linear;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="screen" width="640" height="400"></canvas>
  </div>

  <div id="loading">
    <div>Loading Alþingishúsið…</div>
    <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
  </div>

  <div id="overlay" class="hidden">
    <h1>POTS &amp; PARLIAMENT</h1>
    <p>You just need to file one form. How hard could it be?</p>
    <p class="controls">
      WASD move &nbsp;·&nbsp; Mouse look &nbsp;·&nbsp; Left-click swing the spoon &nbsp;·&nbsp; E / Space interact
    </p>
    <p class="controls">Click anywhere to begin.</p>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
