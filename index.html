<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pots &amp; Parliament</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0c;
        overflow: hidden;
        font-family: "Courier New", monospace;
        color: #e8e0c8;
      }
      #game-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #000;
        cursor: none;
        max-width: 100vw;
        max-height: 100vh;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: rgba(10, 10, 14, 0.82);
        text-align: center;
        padding: 2rem;
        box-sizing: border-box;
        z-index: 10;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay h1 {
        font-size: 2.4rem;
        margin: 0;
        color: #d8b24a;
        letter-spacing: 2px;
        text-shadow: 2px 2px 0 #000;
      }
      #overlay p {
        max-width: 540px;
        line-height: 1.5;
        margin: 0.2rem 0;
      }
      #overlay .hint {
        color: #9aa0b0;
        font-size: 0.85rem;
      }
      #overlay button {
        margin-top: 0.5rem;
        padding: 0.7rem 1.6rem;
        font-family: inherit;
        font-size: 1.1rem;
        font-weight: bold;
        color: #0a0a0c;
        background: #d8b24a;
        border: none;
        cursor: pointer;
        letter-spacing: 1px;
      }
      #overlay button:hover {
        background: #e8c45a;
      }
      #loading-bar {
        width: 320px;
        height: 14px;
        border: 2px solid #d8b24a;
        margin-top: 0.5rem;
      }
      #loading-fill {
        height: 100%;
        width: 0%;
        background: #d8b24a;
        transition: width 0.15s linear;
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <canvas id="game-canvas" data-testid="game-canvas"></canvas>
    </div>
    <div id="overlay" data-testid="game-overlay">
      <h1>Pots &amp; Parliament</h1>
      <p id="overlay-message">Loading the bureaucracy…</p>
      <div id="loading-bar"><div id="loading-fill"></div></div>
      <button id="overlay-button" data-testid="overlay-button" style="display: none">
        Click to Play
      </button>
      <p class="hint">
        WASD move &middot; Mouse look &middot; Click attack &middot; E interact &middot; F fullscreen &middot; Esc pause
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
